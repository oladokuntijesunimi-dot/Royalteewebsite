<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Change Password — Royal Tee Admin</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen">

<nav class="bg-[#0B2545] text-white px-6 lg:px-10 h-16 flex items-center justify-between sticky top-0 z-40 shadow-lg">
  <span class="font-['Cormorant_Garamond'] text-xl">Royal Tee <span class="text-[#C9A24B]">Stitches</span> <span class="text-white/40 text-sm font-['Inter'] font-normal ml-2">Admin</span></span>
  <div class="flex items-center gap-5 text-sm">
    <a href="/admin/dashboard" class="text-white/70 hover:text-[#C9A24B] transition-colors">← Dashboard</a>
    <a href="/admin/logout" class="bg-white/10 hover:bg-white/20 px-4 py-1.5 rounded transition-colors">Log Out</a>
  </div>
</nav>

<main class="max-w-lg mx-auto px-6 py-16">
  <h1 class="font-['Cormorant_Garamond'] text-4xl text-[#0B2545] mb-2">Change Password</h1>
  <p class="text-gray-500 text-sm mb-8">Update your admin portal password. Minimum 6 characters.</p>

  {% if error %}
  <div class="bg-red-50 border border-red-200 text-red-700 text-sm px-4 py-3 mb-6 rounded">{{ error }}</div>
  {% endif %}

  {% if success %}
  <div class="bg-green-50 border border-green-200 text-green-700 text-sm px-4 py-3 mb-6 rounded">{{ success }}</div>
  {% endif %}

  <form method="POST" action="/admin/change-password" class="bg-white border border-gray-100 shadow-sm p-8 space-y-5">
    <div>
      <label class="block text-xs font-semibold uppercase tracking-wide text-[#0B2545] mb-1">Current Password</label>
      <input type="password" name="current_password" required
             class="w-full border border-gray-200 px-4 py-2.5 text-sm focus:outline-none focus:border-[#C9A24B] focus:ring-2 focus:ring-[#C9A24B]/20">
    </div>
    <div>
      <label class="block text-xs font-semibold uppercase tracking-wide text-[#0B2545] mb-1">New Password</label>
      <input type="password" name="new_password" required minlength="6"
             class="w-full border border-gray-200 px-4 py-2.5 text-sm focus:outline-none focus:border-[#C9A24B] focus:ring-2 focus:ring-[#C9A24B]/20">
    </div>
    <div>
      <label class="block text-xs font-semibold uppercase tracking-wide text-[#0B2545] mb-1">Confirm New Password</label>
      <input type="password" name="confirm_password" required minlength="6"
             class="w-full border border-gray-200 px-4 py-2.5 text-sm focus:outline-none focus:border-[#C9A24B] focus:ring-2 focus:ring-[#C9A24B]/20">
    </div>
    <button type="submit"
            class="w-full bg-[#0B2545] text-white font-semibold uppercase tracking-wider text-sm py-3 hover:bg-[#C9A24B] hover:text-[#0B2545] transition-colors duration-300 mt-2">
      Update Password
    </button>
  </form>
</main>
</body>
</html>
